<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tylor Good — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">

    <section class="hero">
      <div class="hero-ambient" aria-hidden="true">
        <span class="hero-ambient-frame hero-ambient-frame-a"></span>
        <span class="hero-ambient-frame hero-ambient-frame-b"></span>
        <span class="hero-ambient-frame hero-ambient-frame-c"></span>
        <span class="hero-ambient-line hero-ambient-line-a"></span>
        <span class="hero-ambient-line hero-ambient-line-b"></span>
      </div>

      <h1>Tylor <span>Good</span></h1>
      <div class="hero-typewriter" aria-live="polite">
        <span class="hero-typewriter-text">Precision Machining &amp; Manufacturing</span>
        <span class="hero-typewriter-cursor" aria-hidden="true"></span>
      </div>
      <p class="hero-sub">CNC machining, tooling, and fabrication portfolio</p>
    </section>

    <div class="container">
      <div class="section-header">
        <span class="mini-label">Projects</span>
        <span class="section-header-line"></span>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </div>

    <footer class="footer">
      Tylor Good &mdash; Precision Manufacturing Portfolio
    </footer>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
